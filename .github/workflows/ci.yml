name: Secure Cloud Storage Platform CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


jobs:

  test:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt


    - name: Run tests
      run: |
        echo "Tests will run here"



  docker-build:

    runs-on: ubuntu-latest

    needs: test

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Build Docker Image
      run: |
        docker build -t secure-cloud-storage-platform-api:${{ github.sha }} ./app
