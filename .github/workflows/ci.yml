name: Secure Cloud Storage Platform CI Pipeline


on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main


permissions:
  id-token: write
  contents: read


jobs:


  test:

    runs-on: ubuntu-latest


    steps:


    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683


    - name: Setup Python
      uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38

      with:
        python-version: "3.11"


    - name: Install dependencies
      run: |
        pip install -r app/requirements.txt


    - name: Run tests
      run: |
        echo "Tests will run here"




  docker-build:


    runs-on: ubuntu-latest

    needs: test


    steps:


    - name: Checkout repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683



    - name: Build Docker Image

      run: |

        docker build \
        -t secure-cloud-storage-platform-api:${{ github.sha }} \
        ./app




    - name: Run Trivy vulnerability scan

      uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8

      with:

        image-ref: secure-cloud-storage-platform-api:${{ github.sha }}

        severity: CRITICAL,HIGH

        exit-code: 1




    - name: Configure AWS credentials

      uses: aws-actions/configure-aws-credentials@9d2a1c17c0d020ee966ed3fa5e24c290d759b4fa

      with:

        role-to-assume: arn:aws:iam::051495878388:role/secure-cloud-github-actions-role

        aws-region: eu-central-1




    - name: Login to Amazon ECR

      uses: aws-actions/amazon-ecr-login@62298a4d576aa7df7db7ade1df0269208c2c581b




    - name: Tag Docker Image

      run: |

        docker tag \
        secure-cloud-storage-platform-api:${{ github.sha }} \
        051495878388.dkr.ecr.eu-central-1.amazonaws.com/secure-cloud-storage-platform:${{ github.sha }}






    - name: Push Docker Image to ECR

      run: |

        docker push \
        051495878388.dkr.ecr.eu-central-1.amazonaws.com/secure-cloud-storage-platform:${{ github.sha }}
